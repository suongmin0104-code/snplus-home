<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#102b46" />
    <meta name="robots" content="noindex, nofollow" />
    <title>인터넷 연결 확인 | SN 업무포털</title>
    <style>
      *{box-sizing:border-box}html,body{min-height:100%;margin:0}body{display:grid;min-width:320px;min-height:100vh;padding:24px;place-items:center;color:#13252d;background:#f3f6f7;font-family:"Malgun Gothic",Arial,sans-serif}.card{width:min(100%,420px);padding:34px 26px;border:1px solid #dce4e7;border-radius:10px;background:#fff;box-shadow:0 18px 44px rgba(15,36,45,.1);text-align:center}.mark{display:grid;width:68px;height:68px;margin:0 auto 20px;place-items:center;border-radius:12px;color:#fff;background:#102b46;font-size:22px;font-weight:900}.card h1{margin:0;font-size:24px}.card p{margin:14px 0 24px;color:#52646c;font-size:15px;line-height:1.7}.card button{width:100%;min-height:50px;border:0;border-radius:7px;color:#fff;background:#168e8c;font-size:15px;font-weight:900;cursor:pointer}
    </style>
  </head>
  <body>
    <main class="card">
      <div class="mark" aria-hidden="true">SN</div>
      <h1>인터넷 연결을 확인해 주세요.</h1>
      <p>업무자료 보호를 위해 현장일지, 견적, 재고 데이터는 오프라인에 저장하지 않습니다. 연결 후 다시 시도해 주세요.</p>
      <button type="button" onclick="location.reload()">다시 연결하기</button>
    </main>
  </body>
</html>
