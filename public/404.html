<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>페이지를 찾을 수 없습니다 | 주식회사 에스앤</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: #f5f7f8;
        color: #152126;
        font-family: "Pretendard", "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      }

      main {
        width: min(520px, calc(100% - 40px));
        padding: 42px;
        border: 1px solid #d9e1e4;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 18px 45px rgba(20, 38, 45, 0.12);
        text-align: center;
      }

      img {
        width: 54px;
        height: 54px;
        object-fit: contain;
      }

      h1 {
        margin: 18px 0 10px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0 auto 24px;
        color: #617178;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 8px;
        background: #152126;
        color: #fff;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/assets/company/sn-logo-mark-small.png" alt="" />
      <h1>페이지를 찾을 수 없습니다.</h1>
      <p>요청하신 주소가 변경되었거나 존재하지 않습니다. 에스앤 홈페이지 첫 화면으로 이동해 주세요.</p>
      <a href="/">홈으로 이동</a>
    </main>
  </body>
</html>
